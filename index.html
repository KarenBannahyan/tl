<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Переводчик</title>
</head>
<body>

<!-- ВСЁ МАКСИМАЛЬНО ЛЕВО -->
<p style="margin: 0;">Введите слово:</p>
<input type="text" id="englishWord" style="margin: 0;">

<p style="margin: 10px 0 0 0;">Кнопка:</p>
<button id="translateBtn">Перевести</button>

<p style="margin: 10px 0 0 0;">Перевод:</p>
<div id="frenchTranslation">—</div>

<script>
    // =============== Элементы ===============
    const input = document.getElementById('englishWord');
    const translateBtn = document.getElementById('translateBtn');
    const outputDiv = document.getElementById('frenchTranslation');

    const FROM_LANG = 'en';
    const TO_LANG = 'fr';

    // Тот же принцип парсинга Google Translate API
    async function translateEnglishToFrench(word) {
        const cleanWord = word.trim();
        
        if (cleanWord === "") {
            throw new Error("Введите слово");
        }

        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${FROM_LANG}&tl=${TO_LANG}&dt=t&q=${encodeURIComponent(cleanWord)}`;
        
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`Ошибка: ${response.status}`);
        }
        
        const data = await response.json();
        
        if (data && Array.isArray(data) && data[0] && Array.isArray(data[0])) {
            let translation = data[0].map(segment => segment[0]).join('');
            
            if (!translation || translation.toLowerCase() === cleanWord.toLowerCase()) {
                throw new Error("Перевод не найден");
            }
            
            return translation;
        } else {
            throw new Error("Ошибка парсинга");
        }
    }

    async function handleTranslation() {
        const word = input.value;
        
        if (!word.trim()) {
            outputDiv.textContent = "❌ Введите слово";
            return;
        }
        
        outputDiv.textContent = "⏳...";
        
        try {
            const translation = await translateEnglishToFrench(word);
            outputDiv.textContent = translation;
        } catch (error) {
            outputDiv.textContent = "❌ " + error.message;
        }
    }

    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleTranslation();
        }
    });

    translateBtn.addEventListener('click', handleTranslation);
</script>

</body>
</html>
