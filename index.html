<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Переводчик</title>
</head>
<body>

<!-- ВСЁ МАКСИМАЛЬНО ЛЕВО, ДЛЯ СТАРОГО ТЕЛЕФОНА -->
<p>Введите слово:</p>
<input type="text" id="englishWord" style="width: 200px;">

<p>Кнопка:</p>
<button id="translateBtn">Перевести</button>

<p>Перевод:</p>
<div id="frenchTranslation">—</div>

<script>
    // =============== Элементы ===============
    var input = document.getElementById('englishWord');
    var button = document.getElementById('translateBtn');
    var output = document.getElementById('frenchTranslation');

    // Функция определения языка (русский или английский)
    function detectLanguage(text) {
        if (/[а-яА-ЯЁё]/.test(text)) {
            return 'ru';
        }
        return 'en';
    }

    // Функция перевода через Google Translate API (тот же метод парсинга)
    function translateWord() {
        var word = input.value.trim();
        
        if (word === "") {
            output.innerHTML = "Введите слово";
            return;
        }
        
        // Определяем исходный язык
        var sourceLang = detectLanguage(word);
        // Целевой язык: если исходный русский → английский, если английский → русский
        var targetLang = (sourceLang === 'ru') ? 'en' : 'ru';
        
        // Показываем загрузку
        output.innerHTML = "Загрузка...";
        
        var xhr = new XMLHttpRequest();
        var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=" + sourceLang + "&tl=" + targetLang + "&dt=t&q=" + encodeURIComponent(word);
        
        xhr.open("GET", url, true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var translation = "";
                        if (data && data[0] && data[0][0] && data[0][0][0]) {
                            translation = data[0][0][0];
                        } else if (data && data[0] && typeof data[0][0] === "string") {
                            translation = data[0][0];
                        } else {
                            translation = "Перевод не найден";
                        }
                        
                        if (translation.toLowerCase() === word.toLowerCase()) {
                            output.innerHTML = "Перевод не найден";
                        } else {
                            output.innerHTML = translation;
                        }
                    } catch(e) {
                        output.innerHTML = "Ошибка разбора";
                    }
                } else {
                    output.innerHTML = "Ошибка: " + xhr.status;
                }
            }
        };
        
        xhr.onerror = function() {
            output.innerHTML = "Ошибка сети";
        };
        
        xhr.send();
    }
    
    button.onclick = translateWord;
    input.onkeypress = function(e) {
        if (e.keyCode === 13) {
            translateWord();
        }
    };
</script>

</body>
</html>
