<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Переводчик</title>
</head>
<body>

<p>Введите слово:</p>
<input type="text" id="englishWord" style="width: 200px;">

<p>Кнопка:</p>
<button id="translateBtn">Перевести</button>

<p>Выберите направление перевода:</p>

<!-- Галочки (радиокнопки, чтобы можно было выбрать только одно направление) -->
<div>
    <input type="radio" name="direction" id="fr_en" value="fr|en">
    <label for="fr_en">Французский → Английский</label>
</div>
<div>
    <input type="radio" name="direction" id="fr_ru" value="fr|ru">
    <label for="fr_ru">Французский → Русский</label>
</div>
<div>
    <input type="radio" name="direction" id="ru_fr" value="ru|fr">
    <label for="ru_fr">Русский → Французский</label>
</div>
<div>
    <input type="radio" name="direction" id="en_fr" value="en|fr" checked>
    <label for="en_fr">Английский → Французский</label>
</div>

<p>Перевод:</p>
<div id="frenchTranslation">—</div>

<script>
    // Получаем элементы
    var input = document.getElementById('englishWord');
    var button = document.getElementById('translateBtn');
    var output = document.getElementById('frenchTranslation');
    var radioButtons = document.querySelectorAll('input[name="direction"]');

    // Функция перевода (работает на старых телефонах)
    function translateWord() {
        var word = input.value.trim();
        
        if (word === "") {
            output.innerHTML = "Введите слово";
            return;
        }
        
        // Получаем выбранное направление
        var direction = "";
        for (var i = 0; i < radioButtons.length; i++) {
            if (radioButtons[i].checked) {
                direction = radioButtons[i].value;
                break;
            }
        }
        
        // Разделяем на исходный язык и целевой
        var languages = direction.split("|");
        var fromLang = languages[0];
        var toLang = languages[1];
        
        // Показываем загрузку
        output.innerHTML = "Загрузка...";
        
        // Создаём XMLHttpRequest (работает везде, даже на старых телефонах)
        var xhr = new XMLHttpRequest();
        
        // Google Translate API
        var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=" + fromLang + "&tl=" + toLang + "&dt=t&q=" + encodeURIComponent(word);
        
        xhr.open("GET", url, true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        
                        // Получаем перевод (разные варианты структуры ответа)
                        var translation = "";
                        if (data && data[0] && data[0][0] && data[0][0][0]) {
                            translation = data[0][0][0];
                        } else if (data && data[0] && typeof data[0][0] === "string") {
                            translation = data[0][0];
                        } else if (data && data[0] && data[0][0] && data[0][0][0] === undefined) {
                            translation = data[0][0];
                        } else {
                            translation = "Перевод не найден";
                        }
                        
                        // Если перевод совпадает с оригиналом
                        if (translation.toLowerCase() === word.toLowerCase()) {
                            output.innerHTML = "Перевод не найден (совпадает с оригиналом)";
                        } else {
                            output.innerHTML = translation;
                        }
                    } catch(e) {
                        output.innerHTML = "Ошибка разбора ответа";
                    }
                } else {
                    output.innerHTML = "Ошибка: " + xhr.status;
                }
            }
        };
        
        xhr.onerror = function() {
            output.innerHTML = "Ошибка сети. Проверьте интернет.";
        };
        
        xhr.send();
    }
    
    // Вешаем обработчик на кнопку
    button.onclick = translateWord;
    
    // Перевод по Enter
    input.onkeypress = function(e) {
        if (e.keyCode === 13) {
            translateWord();
        }
    };
</script>

</body>
</html>
