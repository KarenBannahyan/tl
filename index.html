<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Переводчик</title>
</head>
<body>

<p>Введите слово:</p>
<input type="text" id="englishWord" style="width: 200px;">

<p>Кнопка:</p>
<button id="translateBtn">Перевести</button>

<p>Перевод:</p>
<div id="frenchTranslation">—</div>

<script>
    // Получаем элементы
    var input = document.getElementById('englishWord');
    var button = document.getElementById('translateBtn');
    var output = document.getElementById('frenchTranslation');

    // Функция перевода (старый способ, без fetch, без async/await)
    function translateWord() {
        var word = input.value.trim();
        
        if (word === "") {
            output.innerHTML = "Введите слово";
            return;
        }
        
        // Показываем загрузку
        output.innerHTML = "Загрузка...";
        
        // Создаём старый добрый XMLHttpRequest (работает везде)
        var xhr = new XMLHttpRequest();
        
        // Google Translate API (тот же самый)
        var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=fr&dt=t&q=" + encodeURIComponent(word);
        
        xhr.open("GET", url, true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) { // Запрос завершён
                if (xhr.status === 200) {
                    try {
                        // Парсим JSON (старый способ)
                        var data = JSON.parse(xhr.responseText);
                        
                        // Получаем перевод
                        if (data && data[0] && data[0][0] && data[0][0][0]) {
                            var translation = data[0][0][0];
                            output.innerHTML = translation;
                        } else {
                            output.innerHTML = "Перевод не найден";
                        }
                    } catch(e) {
                        output.innerHTML = "Ошибка разбора ответа";
                    }
                } else {
                    output.innerHTML = "Ошибка: " + xhr.status;
                }
            }
        };
        
        xhr.onerror = function() {
            output.innerHTML = "Ошибка сети. Проверьте интернет.";
        };
        
        xhr.send();
    }
    
    // Вешаем обработчик на кнопку
    button.onclick = translateWord;
    
    // Перевод по Enter
    input.onkeypress = function(e) {
        if (e.keyCode === 13) {
            translateWord();
        }
    };
</script>

</body>
</html>
