<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Переводчик</title>
</head>

<body>

<p><b>С какого:</b></p>
<select id="selectFromLang">
  <option value="en">Английский</option>
  <option value="ru">Русский</option>
  <option value="es">Испанский</option>
  <option value="fr">Французский</option>
  <option value="de">Немецкий</option>
  <option value="pt">Португальский</option>
  <option value="ar">Арабский</option>
  <option value="hy">Армянский</option>
  <option value="az">Азербайджанский</option>
</select>

<p><b>На какой:</b></p>
<select id="selectToLang">
  <option value="ru">Русский</option>
  <option value="en">Английский</option>
  <option value="es">Испанский</option>
  <option value="fr">Французский</option>
  <option value="de">Немецкий</option>
  <option value="pt">Португальский</option>
  <option value="ar">Арабский</option>
  <option value="hy">Армянский</option>
  <option value="az">Азербайджанский</option>
</select>

<p>Введите слово или фразу:</p>

<input type="text" id="inputWord" style="width:200px;">

<!-- Французские символы -->
<div style="margin-top:8px;">
  <button type="button" onclick="addChar('é')">é</button>
  <button type="button" onclick="addChar('è')">è</button>
  <button type="button" onclick="addChar('ê')">ê</button>
  <button type="button" onclick="addChar('ë')">ë</button>
  <button type="button" onclick="addChar('à')">à</button>
  <button type="button" onclick="addChar('â')">â</button>
  <button type="button" onclick="addChar('ç')">ç</button>
  <button type="button" onclick="addChar('î')">î</button>
  <button type="button" onclick="addChar('ï')">ï</button>
  <button type="button" onclick="addChar('ô')">ô</button>
  <button type="button" onclick="addChar('ù')">ù</button>
  <button type="button" onclick="addChar('û')">û</button>
  <button type="button" onclick="addChar('œ')">œ</button>
</div>

<p><button id="translateBtn">Перевести</button></p>

<p><b>Перевод:</b></p>
<div id="transResult">—</div>

<script>

// глобальные переменные
var input, btn, selectFrom, selectTo, resultBox;

// вставка символов
function addChar(ch) {
  input.value = input.value + ch;
  input.focus();
}

// перевод через Google API
function translateWord(word, fromLang, toLang, callback) {

  if (!word || word === "") {
    callback("—");
    return;
  }

  var xhr = new XMLHttpRequest();
  var url =
    "https://translate.googleapis.com/translate_a/single?client=gtx&sl=" +
    fromLang + "&tl=" + toLang + "&dt=t&q=" + encodeURIComponent(word);

  xhr.open("GET", url, true);

  xhr.onreadystatechange = function () {
    if (xhr.readyState == 4) {
      if (xhr.status == 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          var text = "—";

          if (data && data[0] && data[0][0] && data[0][0][0]) {
            text = data[0][0][0];
          }

          callback(text);
        } catch (e) {
          callback("Ошибка");
        }
      } else {
        callback("Ошибка " + xhr.status);
      }
    }
  };

  xhr.send();
}

// основной перевод
function translateMain() {

  var word = input.value;

  if (!word || word === "") {
    resultBox.innerHTML = "Введите слово";
    return;
  }

  var fromLang = selectFrom.value;
  var toLang = selectTo.value;

  resultBox.innerHTML = "Загрузка...";

  translateWord(word, fromLang, toLang, function (res) {
    resultBox.innerHTML = res;
  });
}

// запуск после загрузки страницы (ВАЖНО для старых телефонов)
window.onload = function () {

  input = document.getElementById("inputWord");
  btn = document.getElementById("translateBtn");
  selectFrom = document.getElementById("selectFromLang");
  selectTo = document.getElementById("selectToLang");
  resultBox = document.getElementById("transResult");

  btn.onclick = function () {
    translateMain();
  };

  input.onkeypress = function (e) {
    e = e || window.event;
    if (e.keyCode == 13) {
      translateMain();
    }
  };

};

</script>

</body>
</html>
