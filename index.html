<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Переводчик с пиньинем</title>
</head>

<body>

<!-- ВСЁ МАКСИМАЛЬНО ЛЕВО, БЕЗ CSS, ДЛЯ СТАРОГО ТЕЛЕФОНА -->

<p>Введите слово (англ/рус):</p>

<input type="text" id="inputWord" style="width: 200px;">

<!-- Французские символы -->
<div style="margin-top:8px;">
  <button type="button" onclick="addChar('é')">é</button>
  <button type="button" onclick="addChar('è')">è</button>
  <button type="button" onclick="addChar('ê')">ê</button>
  <button type="button" onclick="addChar('ë')">ë</button>
  <button type="button" onclick="addChar('à')">à</button>
  <button type="button" onclick="addChar('â')">â</button>
  <button type="button" onclick="addChar('ç')">ç</button>
  <button type="button" onclick="addChar('î')">î</button>
  <button type="button" onclick="addChar('ï')">ï</button>
  <button type="button" onclick="addChar('ô')">ô</button>
  <button type="button" onclick="addChar('ù')">ù</button>
  <button type="button" onclick="addChar('û')">û</button>
</div>

<p><button id="translateBtn">Перевести</button></p>

<p>Англ/Рус:</p>
<div id="transEnRu">—</div>

<p>Испанский:</p>
<div id="transEs">—</div>

<p>Французский:</p>
<div id="transFr">—</div>

<p>Италянский:</p>
<div id="transIt">—</div>

<p>Немецкий:</p>
<div id="transDe">—</div>

<p>Китайский (пиньинь):</p>
<div id="transZh">—</div>

<!-- Подключаем библиотеку pinyin-pro (работает и на старых телефонах) -->
<script src="https://unpkg.com/pinyin-pro"></script>

<script>
function addChar(char) {
  const input = document.getElementById("inputWord");
  input.value += char;
  input.focus();
}

// Элементы
var input = document.getElementById('inputWord');
var btn = document.getElementById('translateBtn');
var outEnRu = document.getElementById('transEnRu');
var outEs = document.getElementById('transEs');
var outFr = document.getElementById('transFr');
var outDe = document.getElementById('transDe');
var outZh = document.getElementById('transZh');
var outIt = document.getElementById('transIt');

// Определение языка (русский или английский)
function detectLang(text) {
    if (/[а-яА-ЯЁё]/.test(text)) return 'ru';
    return 'fr';
}

// Универсальный перевод через Google Translate (старый XMLHttpRequest)
function translateWord(word, fromLang, toLang, callback) {
    if (!word || word.trim() === "") {
        callback("—");
        return;
    }
    var xhr = new XMLHttpRequest();
    var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=" + fromLang + "&tl=" + toLang + "&dt=t&q=" + encodeURIComponent(word);
    xhr.open("GET", url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    var translation = "";
                    if (data && data[0] && data[0][0] && data[0][0][0]) {
                        translation = data[0][0][0];
                    } else if (data && data[0] && typeof data[0][0] === "string") {
                        translation = data[0][0];
                    } else {
                        translation = "—";
                    }
                    callback(translation);
                } catch(e) {
                    callback("Ошибка");
                }
            } else {
                callback("Ошибка " + xhr.status);
            }
        }
    };
    xhr.onerror = function() { callback("Ошибка сети"); };
    xhr.send();
}

// Перевод в китайский пиньинь (без иероглифов)
function translateToPinyin(word, fromLang, callback) {
    if (!word || word.trim() === "") {
        callback("—");
        return;
    }
    // Сначала переводим слово на китайский (иероглифы)
    translateWord(word, fromLang, 'zh-CN', function(chineseText) {
        if (!chineseText || chineseText === "—" || chineseText === "Ошибка" || chineseText === "Ошибка сети") {
            callback("—");
            return;
        }
        // Используем pinyin-pro для конвертации иероглифов в пиньинь
        try {
            if (window.pinyinPro && typeof window.pinyinPro.pinyin === 'function') {
                var pinyinResult = window.pinyinPro.pinyin(chineseText, { toneType: 'symbol' });
                callback(pinyinResult || "—");
            } else {
                // Если библиотека не загрузилась, показываем иероглифы
                callback(chineseText);
            }
        } catch(e) {
            callback(chineseText);
        }
    });
}

// Главная функция перевода (все языки)
function translateAll() {
    var word = input.value.trim();
    if (word === "") {
        outEnRu.innerHTML = "Введите слово";
        outEs.innerHTML = "—";
        outFr.innerHTML = "—";
        outDe.innerHTML = "—";
        outZh.innerHTML = "—";
        outIt.innerHTML = "—";
        return;
    }
    
    var sourceLang = detectLang(word);
    var targetLang = (sourceLang === 'ru') ? 'en' : 'ru';
    
    // Показываем загрузку
    outEnRu.innerHTML = "Загрузка...";
    outEs.innerHTML = "Загрузка...";
    outFr.innerHTML = "Загрузка...";
    outDe.innerHTML = "Загрузка...";
    outZh.innerHTML = "Загрузка...";
    outIt.innerHTML = "Загрузка...";

    
    // 1. Английский ↔ Русский
    translateWord(word, sourceLang, targetLang, function(res) {
        outEnRu.innerHTML = res;
    });
    
    // 2. Испанский
    translateWord(word, sourceLang, 'es', function(res) {
        outEs.innerHTML = res;
    });
    
    // 3. Французский
    translateWord(word, sourceLang, 'fr', function(res) {
        outFr.innerHTML = res;
    });
    
    translateWord(word, sourceLang, 'it', function(res) {
        outIt.innerHTML = res;
    });
    
    // 4. Немецкий
    translateWord(word, sourceLang, 'de', function(res) {
        outDe.innerHTML = res;
    });
    
    // 5. Китайский (только пиньинь, без иероглифов)
    translateToPinyin(word, sourceLang, function(res) {
        outZh.innerHTML = res;
    });

}

// Вешаем обработчики
btn.onclick = translateAll;
input.onkeypress = function(e) {
    if (e.keyCode === 13) translateAll();
};
</script>

</body>
</html>
